<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras</title>
    <link rel="stylesheet" href="styles/index.css">
</head>

<body>
    <header>
        <img src="assets/logo.png" alt="">
    </header>
    <main>
        <form class="app">
            <div class="back">
                <a href="#">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                        color="currentColor" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M5.5 12.002H19" />
                        <path
                            d="M10.9999 18.002C10.9999 18.002 4.99998 13.583 4.99997 12.0019C4.99996 10.4208 11 6.00195 11 6.00195" />
                    </svg>
                    <span>Voltar</span>
                </a>
            </div>
            <h1>Compras da semana</h1>
            <div class="addItem">
                <input type="text" id="addNewItem" placeholder="Adicione um novo item">
                <button type="submit">
                    <span>Adicionar item</span>
                </button>
            </div>
            <div id="lista" class="items">
                <div class="item">
                    <input type="checkbox" name="check" id="check">
                    <span>Pão de forma</span>
                    <img src="assets/icons/lixeira.svg" alt="lixeira icon">
                </div>
                <div class="item">
                    <input type="checkbox" name="check" id="check">
                    <span>Café preto</span>
                    <img src="assets/icons/lixeira.svg" alt="lixeira icon">
                </div>
                <div class="item">
                    <input type="checkbox" name="check" id="check">
                    <span>Suco de laranja</span>
                    <img src="assets/icons/lixeira.svg" alt="lixeira icon">
                </div>
                <div class="item">
                    <input type="checkbox" name="check" id="check">
                    <span>Bolacha</span>
                    <img src="assets/icons/lixeira.svg" alt="lixeira icon">
                </div>
            </div>
            <div class="removed disable">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor"
                    fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M12 8V12.5" />
                    <path d="M12 15.9883V15.9983" />
                </svg>
                <span>O item foi removido da lista</span>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor"
                    fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 6L12 12M12 12L6 18M12 12L18 18M12 12L6 6" />
                </svg>
            </div>
        </form>
    </main>
    <script src="scripts.js"></script>
</body>

</html>
